name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  games-unit:
    name: Games — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/games

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Run unit tests
        run: bun test tests/unit

  wallets-unit:
    name: Wallets — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/wallets

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Run unit tests
        run: bun test tests/unit

  frontend:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Run tests
        run: bun test
