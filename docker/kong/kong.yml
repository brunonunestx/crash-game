_format_version: "3.0"

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - Accept
        - X-Api-Key
      exposed_headers:
        - Authorization
      credentials: false
      max_age: 3600

services:
  - name: games-service
    url: http://games:4001
    routes:
      - name: games-routes
        paths:
          - /games
        strip_path: false

  - name: games-websocket
    url: http://games:4001
    routes:
      - name: games-ws-route
        paths:
          - /games/socket.io
        strip_path: false

  - name: wallets-service
    url: http://wallets:4002
    routes:
      - name: wallets-routes
        paths:
          - /wallets
        strip_path: false
